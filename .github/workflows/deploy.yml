name: Deploy → gravitas.net.br

on:
  push:
    branches: [main, claude/loving-clarke-3K1Tq, claude/new-project-5ivoah]

jobs:
  deploy:
    name: Deploy para o servidor
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/u278289683/domains/gravitas.net.br/public_html/principal
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/Wergutz/gravitas.git
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            echo '<?php header("Location: /principal/", true, 301); exit;' > /home/u278289683/domains/gravitas.net.br/public_html/index.php
            mkdir -p /home/u278289683/domains/gravitas.net.br/public_html/marco_urbano
            cp -rT /home/u278289683/domains/gravitas.net.br/public_html/principal/marco_urbano /home/u278289683/domains/gravitas.net.br/public_html/marco_urbano
            mkdir -p /home/u278289683/domains/gravitas.net.br/public_html/login
            cp -rT /home/u278289683/domains/gravitas.net.br/public_html/principal/login /home/u278289683/domains/gravitas.net.br/public_html/login
            mkdir -p /home/u278289683/domains/gravitas.net.br/public_html/seconheca
            cp -rT /home/u278289683/domains/gravitas.net.br/public_html/principal/seconheca /home/u278289683/domains/gravitas.net.br/public_html/seconheca
