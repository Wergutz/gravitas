name: Deploy → gravitas.net.br

on:
  push:
    branches: [main, claude/loving-clarke-3K1Tq]

jobs:
  deploy:
    name: Deploy para o servidor
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            BASE=/home/u278289683/domains/gravitas.net.br/public_html
            cd $BASE/principal
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/Wergutz/gravitas.git
            git fetch origin main
            git reset --hard origin/main
            echo '<?php header("Location: /principal/", true, 301); exit;' > $BASE/index.php
            mkdir -p $BASE/principal/painel/uploads/os/topo
            mkdir -p $BASE/principal/topografo/uploads/os/topo
            mkdir -p $BASE/principal/marco_urbano/painel/uploads/os/topo
            mkdir -p $BASE/marco_urbano
            cp -rT $BASE/principal/marco_urbano $BASE/marco_urbano
            mkdir -p $BASE/marco_urbano/topografo/uploads/os/topo
            mkdir -p $BASE/principal/cheron_camargo/painel/uploads/os/topo
            mkdir -p $BASE/cheron_camargo
            cp -rT $BASE/principal/cheron_camargo $BASE/cheron_camargo
            mkdir -p $BASE/cheron_camargo/topografo/uploads/os/topo
            mkdir -p $BASE/login
            cp -rT $BASE/principal/login $BASE/login
