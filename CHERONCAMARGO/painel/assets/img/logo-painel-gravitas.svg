<svg viewBox="-4 -4 108 108" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Painel de Controle Gravitas">
  <!--
    PAINEL DE CONTROLE GRAVITAS — símbolo oficial
    Conceito: medidor circular (gauge) = painel de controle da obra,
    cruzado por uma elipse orbital que ecoa o átomo do logo Gravitas.
    Paleta Gravitas: navy #1A2D4F (primária) · dourado #C9A227 (acento) · prata #9AA3B2 (neutro)
    Versão para fundos CLAROS. Legível de 16px a grandes formatos.
  -->
  <style>
    .navy { fill: #1A2D4F; }
    .gold { fill: #C9A227; }
  </style>

  <!-- elipse orbital (referência ao átomo Gravitas), prata, atrás do disco -->
  <ellipse cx="50" cy="50" rx="54" ry="19"
           fill="none" stroke="#9AA3B2" stroke-width="3.5"
           transform="rotate(-24 50 50)"/>

  <!-- disco do painel (navy) -->
  <circle cx="50" cy="50" r="44" class="navy"/>

  <!-- trecho frontal da órbita passando sobre o disco -->
  <path d="M 7.2 76.9 A 54 19 -24 0 1 92.8 23.1"
        fill="none" stroke="#9AA3B2" stroke-width="3.5" opacity="0.55"/>

  <!-- satélite dourado sobre a órbita -->
  <circle cx="92.8" cy="23.1" r="4.5" class="gold"/>

  <!-- arco do medidor (gauge), branco, aberto na base -->
  <path d="M 26.7 73.3 A 33 33 0 1 1 73.3 73.3"
        fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>

  <!-- marcações do medidor -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="50" y1="17" x2="50" y2="24"/>
    <line x1="26.7" y1="26.7" x2="31.6" y2="31.6"/>
    <line x1="73.3" y1="26.7" x2="68.4" y2="31.6"/>
  </g>

  <!-- ponteiro dourado apontando para alto desempenho (direita-cima) -->
  <path d="M 50 50 L 67.4 29.3 L 55.5 53.5 Z" class="gold"/>
  <!-- eixo do ponteiro -->
  <circle cx="50" cy="50" r="6.5" class="gold"/>
  <circle cx="50" cy="50" r="3" class="navy"/>
</svg>
